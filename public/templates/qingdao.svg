<?xml version="1.0" encoding="UTF-8"?>
<svg width="1080" height="720" viewBox="0 0 1080 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#145a32" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="white" stroke-width="0.5" stroke-opacity="0.06"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1080" height="720" fill="url(#bg)"/>
  <rect width="1080" height="720" fill="url(#grid)"/>
  
  <!-- Billboard frame -->
  <rect x="8" y="8" width="1064" height="704" fill="none" 
    stroke="rgba(255,220,50,0.35)" stroke-width="10" rx="4"/>
  
  <!-- Center glow -->
  <circle cx="540" cy="340" r="150" fill="rgba(255,255,255,0.04)"/>
  <circle cx="540" cy="340" r="80" fill="rgba(255,255,255,0.06)"/>
  <text x="540" y="370" text-anchor="middle" dominant-baseline="middle" 
    font-size="90" font-family="sans-serif" fill="rgba(255,220,50,0.5)">🏆</text>
  
  <!-- People slots -->
  
    <rect x="275" y="200" width="120" height="160" 
      fill="rgba(255,255,255,0.08)" rx="8" stroke="#FF2442" stroke-width="3" stroke-dasharray="10,5"/>
    <ellipse cx="335" cy="238" rx="32" ry="32" fill="rgba(255,255,255,0.15)"/>
    <rect x="290" y="274" width="90" height="68" rx="10" fill="rgba(255,255,255,0.12)"/>
    <rect x="278" y="203" width="30" height="22" rx="6" fill="#FF2442"/>
    <text x="293" y="217" text-anchor="middle" dominant-baseline="middle" 
      fill="white" font-size="14" font-weight="bold" font-family="sans-serif">1</text>
  
    <rect x="685" y="200" width="120" height="160" 
      fill="rgba(255,255,255,0.08)" rx="8" stroke="#FF2442" stroke-width="3" stroke-dasharray="10,5"/>
    <ellipse cx="745" cy="238" rx="32" ry="32" fill="rgba(255,255,255,0.15)"/>
    <rect x="700" y="274" width="90" height="68" rx="10" fill="rgba(255,255,255,0.12)"/>
    <rect x="688" y="203" width="30" height="22" rx="6" fill="#FF2442"/>
    <text x="703" y="217" text-anchor="middle" dominant-baseline="middle" 
      fill="white" font-size="14" font-weight="bold" font-family="sans-serif">2</text>
  
  
  <!-- Top bar -->
  <rect x="0" y="0" width="1080" height="75" fill="rgba(0,0,0,0.65)"/>
  <text x="28" y="37" dominant-baseline="middle" fill="#FF2442" 
    font-size="30" font-weight="bold" font-family="sans-serif">小红书 × 世界杯</text>
  <text x="1052" y="37" text-anchor="end" dominant-baseline="middle" 
    fill="rgba(255,255,255,0.7)" font-size="22" font-family="sans-serif">青岛 · 万象城</text>
  
  <!-- Bottom bar -->
  <rect x="0" y="660" width="1080" height="60" fill="rgba(0,0,0,0.65)"/>
  <text x="540" y="690" text-anchor="middle" dominant-baseline="middle"
    fill="rgba(255,220,50,0.9)" font-size="22" font-weight="bold" font-family="sans-serif">
    快来找找你在哪里   ⚽   #我被藏进世界杯大屏里了
  </text>
  
  <!-- LIVE indicator -->
  <circle cx="40" cy="620" r="8" fill="#FF2442">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="55" y="620" dominant-baseline="middle" fill="#FF2442" 
    font-size="16" font-weight="bold" font-family="sans-serif">LIVE</text>
</svg>